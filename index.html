<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&family=M+PLUS+Rounded+1c&display=swap"
        rel="stylesheet">
    <script src="scripts/script.js" defer></script>
    <title>Previsão do tempo</title>
</head>

<body class="sunny">
    <header class="header">

    </header class="header">
    <main class="display__weather">
        <h3 class="location__h3">Minha localização</h3>
        <button class="description__h2" id="change__location">Localização hipotética</button>
        <h1 class="temperature__h1">97°</h1>
        <h2 class="weather__h2">Ensolarado</h2>
    </main>

    <section class="container__weather">
        <div class="div__weather">
            <h2 class="div__weather__h2">Acompanhe hoje e a semana toda aqui!</h2>
            <br class="white__line">
            <ul class="ul__weather">

                <li class="li__upcoming__days active">
                    <h2 class="li__upcoming__days-h2" id="day1_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day1_img">
                    <h3 class="li__upcoming__days-h3" id="day1_h3">69°</h3>
                </li>
                <li class="li__upcoming__days">
                    <h2 class="li__upcoming__days-h2" id="day2_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day2_img">
                    <h3 class="li__upcoming__days-h3" id="day2_h3">69° </h3>
                </li>
                <li class="li__upcoming__days">
                    <h2 class="li__upcoming__days-h2" id="day3_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day3_img">
                    <h3 class="li__upcoming__days-h3" id="day3_h3">69°</h3>
                </li>
                <li class="li__upcoming__days">
                    <h2 class="li__upcoming__days-h2" id="day4_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day4_img">
                    <h3 class="li__upcoming__days-h3" id="day4_h3">69°</h3>
                </li>
                <li class="li__upcoming__days">
                    <h2 class="li__upcoming__days-h2" id="day5_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day5_img">
                    <h3 class="li__upcoming__days-h3" id="day5_h3">69°</h3>
                </li>
                <li class="li__upcoming__days">
                    <h2 class="li__upcoming__days-h2" id="day6_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day6_img">
                    <h3 class="li__upcoming__days-h3" id="day6_h3">69°</h3>
                </li>
                <li class="li__upcoming__days">
                    <h2 class="li__upcoming__days-h2" id="day7_h2"></h2>
                    <img src="img/sol.png" alt="Sol" class="weather__img" id="day7_img">
                    <h3 class="li__upcoming__days-h3" id="day7_h3">69°</h3>
                </li>
            </ul>
        </div>
    </section>

    <section class="card__day">
        <div class="superior__part">

            <div class="average__temp">
                <h3 class="average__temp__h3">A temperatura média hoje será:</h3>
                <div class="average__temp__temp">
                <h2 class="average__temp__h2">69°</h2>
                </div>
            </div>

            <div class="max__min">
                <div class="max">
                    <i class="fa-solid fa-temperature-full"></i>
                    <h3 class="max__temp">10</h3>
                </div>
                <div class="min">
                    <i class="fa-solid fa-temperature-full"></i>
                    <h3 class="min__temp">1</h3>
                </div>
            </div>
        </div>
        <div>

        </div>
    </section>
</body>

</html>
